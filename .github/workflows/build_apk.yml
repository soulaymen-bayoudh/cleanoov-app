name: Build APK Cleanoov

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release --split-per-abi

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk Cleanoov-arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk Cleanoov-arm32.apk

      - name: Delete old release
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Cleanoov App — Dernière version"
          body: |
            ## Application Cleanoov — Nettoyage Panneaux PV

            ### Installation Android
            1. Télécharge **Cleanoov-arm64.apk** (téléphones récents)
            2. Ou **Cleanoov-arm32.apk** (anciens téléphones)
            3. Autorise "Sources inconnues" dans les paramètres Android
            4. Lance le fichier APK téléchargé

          files: |
            Cleanoov-arm64.apk
            Cleanoov-arm32.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
